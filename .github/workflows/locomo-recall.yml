name: LOCOMO recall

# Retrieval-quality tripwire: runs the locomo-recall example against the committed
# fixture (frozen vectors → only the engine varies) and reports recall@k on real
# long-term-memory queries. This complements the brute-force recall gate in the
# `check` job (which proves the ANN index returns the true neighbours); this one
# proves ranking/fusion quality holds up on real questions.
#
# Runs on every PR (and push to main), and INFORMATIONAL: keep it out of branch
# protection's required set so a recall wobble never blocks a merge. The run is
# cheap (frozen fixture, no embedder/network), so it guards every change rather
# than guessing which paths touch retrieval. Promote to enforcing later by adding
# `-- --fail-under=<floor>` once the baseline's natural variance is understood.
on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -D warnings

jobs:
  recall:
    name: LOCOMO recall (informational)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - name: Free disk space
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: false
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: true
          swap-storage: true
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      # The fixture carries frozen vectors, so this needs no embedder, key, or
      # network — just the engine. Reports recall@k + every hybrid miss in the log.
      #
      # The floor is a TOLERANCE BAND, not the baseline: hybrid recall@10 is ~0.634
      # on the committed fixture but jitters ~1pt run-to-run (RRF tie-break ordering
      # isn't deterministic — vector/keyword are stable), so 0.60 leaves ~3pt of
      # headroom. That trips on a real ranking/fusion regression without flaking on
      # the jitter. Raise it once hybrid tie-breaking is made deterministic.
      - run: cargo run --example locomo-recall -- --fail-under=0.68
