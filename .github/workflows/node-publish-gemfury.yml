name: Node publish (Gemfury early access)

# Interim early-access publish: builds the prebuilt addon for every supported
# platform and publishes the `infino` package (+ its per-platform binary
# packages) to a Gemfury npm registry instead of the public npm registry.
#
# Testers install with just a registry flag, no token (the Gemfury packages are
# public/unlisted — reachable only via the registry URL, not on npmjs.org or in
# `npm i infino`):
#
#   npm i infino --registry https://npm.fury.io/<account>/
#
# The public-launch path lives in node-publish.yml and is left untouched; at
# launch we publish there (npmjs.org) and testers drop the --registry flag.
#
# Triggered manually. Default run is a dry run (pack + validate, publish
# nothing). A real run needs:
#   - secret  FURY_PUSH_TOKEN  — a Gemfury push token
#   - variable FURY_ACCOUNT    — the Gemfury account name (npm.fury.io/<account>/)

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Validate only — pack everything, publish nothing"
        type: boolean
        default: true

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: ""

jobs:
  build:
    name: Build addon (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      # One native runner per target — no cross-compilation. mac + Linux-gnu
      # only (no Windows/musl), matching the supported-platform decision.
      matrix:
        include:
          - { os: ubuntu-latest, target: linux-x64-gnu }
          - { os: ubuntu-24.04-arm, target: linux-arm64-gnu }
          - { os: macos-13, target: darwin-x64 }
          - { os: macos-14, target: darwin-arm64 }
    steps:
      - uses: actions/checkout@v4
      - name: Free disk space
        if: runner.os == 'Linux'
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: false
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: true
          swap-storage: true
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: infino-node
      - run: make node-build
      - name: Upload addon
        uses: actions/upload-artifact@v4
        with:
          name: addon-${{ matrix.target }}
          path: infino-node/infino/*.node
          if-no-files-found: error
      - name: Upload JS bindings
        if: matrix.target == 'linux-x64-gnu'
        uses: actions/upload-artifact@v4
        with:
          name: js-bindings
          path: |
            infino-node/infino/native.js
            infino-node/infino/native.d.ts
            infino-node/infino/index.js
            infino-node/infino/index.d.ts
          if-no-files-found: error

  publish:
    name: Publish to Gemfury
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Download platform addons
        uses: actions/download-artifact@v4
        with:
          pattern: addon-*
          path: infino-node/artifacts
          merge-multiple: true
      - name: Download JS bindings
        uses: actions/download-artifact@v4
        with:
          name: js-bindings
          path: infino-node/infino
      - name: Install tooling
        run: cd infino-node && npm install --ignore-scripts
      - name: Generate platform package dirs
        run: cd infino-node && npx napi create-npm-dir -t .
      - name: Stage binaries into platform packages
        run: cd infino-node && npm run artifacts
      # Point the default registry at Gemfury so napi prepublish + npm publish
      # push the main package and every per-platform package there. The main
      # package and all `infino-<triple>` packages must land in the same account
      # or tokenless install can't resolve the binary.
      - name: Configure Gemfury registry
        working-directory: infino-node
        run: |
          {
            echo "registry=https://npm.fury.io/${{ vars.FURY_ACCOUNT }}/"
            echo "//npm.fury.io/${{ vars.FURY_ACCOUNT }}/:_authToken=${{ secrets.FURY_PUSH_TOKEN }}"
            echo "always-auth=true"
          } > .npmrc
      - name: Validate (dry run)
        if: ${{ inputs.dry_run }}
        run: |
          cd infino-node
          npx napi prepublish -t npm --skip-gh-release --dry-run
          npm publish --dry-run
      - name: Publish to Gemfury
        if: ${{ !inputs.dry_run }}
        run: |
          cd infino-node
          npx napi prepublish -t npm --skip-gh-release
          npm publish
