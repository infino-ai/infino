name: Node examples (e2e)

# Runs the runnable Node examples (examples/agent-memory, examples/hybrid-search-api)
# end to end against a freshly built addon. They fetch real public datasets and
# download an embedding model, so this is kept OUT of the default CI gate (which
# stays hermetic via `make node-test`): a Hub outage or rate limit shouldn't block
# a merge. It runs on PRs that touch the engine or the binding (the addon is
# built from the Rust crate, so an engine change can break an example too),
# nightly to catch external drift, and on demand.

on:
  pull_request:
    paths:
      - "infino-node/**" # the binding + the examples
      - "src/**" # the engine the addon is built from — a change here can shift behavior
      - "Cargo.toml"
      - "Cargo.lock"
      - "Makefile"
      - ".github/workflows/node-examples.yml"
  schedule:
    - cron: "0 6 * * *" # nightly (06:00 UTC) — catches dataset/model/external drift
  workflow_dispatch:

permissions:
  contents: read

jobs:
  examples:
    name: Node examples (e2e)
    runs-on: ubuntu-latest
    env:
      RUSTFLAGS: ""
    steps:
      - uses: actions/checkout@v4
      - name: Free disk space
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: false
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: true
          swap-storage: true
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: infino-node
      # Build the addon (debug); the examples' `file:../..` dependency links it.
      - run: cd infino-node && npm install && npm run build:debug
      # Run each example end to end (self-asserting; non-zero exit fails the job).
      - run: make node-example
