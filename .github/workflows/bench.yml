name: Benchmark

# Informational benchmark — superfile + supertable tiers, one in-region Azure
# VM per leg, in parallel. Never blocks merge. On a PR: diff vs main's baseline.
# On merge to main: publish the run as that baseline + a per-commit history point.
#
# Runs on `pull_request_target`, not `pull_request`, so the job executes in the
# base-repo context where the Azure secrets and a writable token exist — a fork
# `pull_request` run is sandboxed (no secrets, read-only token) and can't log in
# to Azure. The workflow definition is always taken from the base branch, so a
# fork can't alter it; fork code is only exercised by checking out the PR head
# SHA on the VM. The control that stops a malicious fork from exfiltrating those
# secrets is the `bench` environment's required reviewers (see `is_fork_pr` and
# the `environment` expression in supertable-bench-azure.yml): a fork run pauses
# until a maintainer approves the diff. Same-repo PRs are trusted and run
# without approval under the `ci` environment.
on:
  push:
    branches: [main]
  pull_request_target:
    branches: [main]

jobs:
  bench:
    strategy:
      fail-fast: false # one member failing must not cancel the other
      matrix:
        # One supertable modality per leg, each on its own VM with its own
        # baseline and PR comment. `suffix` keeps every leg's Azure resources,
        # VM name, and comment marker unique (all legs share one run_id).
        include:
          - { bench: superfile,         docs: "1000000", suffix: sf }
          - { bench: supertable_fts,    docs: "1000000", suffix: st-fts }
          - { bench: supertable_vector, docs: "1000000", suffix: st-vec }
          - { bench: supertable_sql,    docs: "1000000", suffix: st-sql }
    # PR: a new push cancels the in-flight run. main: serialize per bench so
    # concurrent merges don't race the baseline blob (never cancel).
    concurrency:
      group: bench-${{ github.event_name == 'push' && 'main' || github.event.pull_request.number }}-${{ matrix.bench }}
      cancel-in-progress: ${{ github.event_name == 'pull_request_target' }}
    permissions:
      id-token: write
      contents: read
      pull-requests: write # post the bench-results comment on the PR
    uses: ./.github/workflows/supertable-bench-azure.yml
    with:
      bench: ${{ matrix.bench }}
      docs: ${{ matrix.docs }}
      ref: ${{ github.event_name == 'push' && github.sha || github.event.pull_request.head.sha }}
      name_suffix: -${{ matrix.suffix }}
      update_baseline: ${{ github.event_name == 'push' }}
      pr_number: ${{ github.event_name == 'pull_request_target' && github.event.pull_request.number || '' }}
      # Fork PR ⇒ route through the gated `bench` environment so a maintainer
      # approves before secrets are exposed to fork-authored code.
      is_fork_pr: ${{ github.event_name == 'pull_request_target' && github.event.pull_request.head.repo.full_name != github.repository }}
    secrets: inherit
